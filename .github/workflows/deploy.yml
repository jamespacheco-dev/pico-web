name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          ping: ${{ vars.REGISTRY_IP }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ vars.REGISTRY_IP }}:${{ vars.REGISTRY_PORT }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
          outputs: type=registry,registry.insecure=true
          build-args: |
            VITE_API_URL=${{ vars.API_URL }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBECONFIG_PICO }}" | tr -d '[:space:]' | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy
        env:
          REGISTRY: ${{ vars.REGISTRY_IP }}:${{ vars.REGISTRY_PORT }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          envsubst < k8s/deployment.yaml.tpl | kubectl apply -f -
          envsubst < k8s/ingress.yaml.tpl | kubectl apply -f -
          kubectl rollout status deployment/pico-web -n pico
